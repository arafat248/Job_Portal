{% load static %}
<!DOCTYPE html>
<html>
      <head>
            <title>{% block meta_title %}JobKhuji{% endblock %}</title>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
            <meta name="description" content="{% block meta_description %}JobKhuji is your one-stop destination for finding the perfect job or hiring the best talent. Discover thousands of job opportunities across various industries.{% endblock %}" />
            <meta name="keywords" content="{% block meta_keywords %}job, portal, career, hiring, recruitment, job search, find job{% endblock %}" />
            
            {% block extra_meta %}{% endblock %}

            {% include 'head.html' %}
      </head>
      <body id="top">
            {% include 'header.html' %}
            {% block content %}{% endblock %}
            {% include 'footer.html' %}
            {% include 'scripts.html' %} 
            {% block extra_scripts %} {% endblock %}
      </body>
</html>
